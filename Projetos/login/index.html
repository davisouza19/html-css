<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Dev-Club login</title>
</head>
<body>
    <main>
        <form action="" method="post" autocomplete="on">

            <h1>Login</h1>

            <div class="input-box">
                <input type="email" name="usu" id="usurname" autocomplete="email" placeholder="Username" required>
                <img width="20" height="20" src="https://img.icons8.com/material-sharp/24/user.png" alt="user"/>
            </div>

            <div class="input-box">
                <input type="password" name="password" id="password" autocomplete="current-password" placeholder="Password" required>
                <img width="20" height="20" src="https://img.icons8.com/metro/26/lock-2.png" alt="lock-2"/>
            </div>

            <div class="password-opt">
                <div class="password-container">
                    <input type="checkbox" name="remember" id="remember">
                    <label for="remember">remember password.</label>
                </div>
                
                <div>
                    <a href="#" class="forgotp">Forgot the password?</a>
                </div>
            </div>

            <div class="submit-container">
                <button type="submit">Login</button>
            </div>

            <div class="register">
                <p>Don't you have an account? <a href="#">Register</a></p>
            </div>

        </form>
    </main>
</body>
</html>

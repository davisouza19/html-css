<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframes</title>
    <style>
        body{
            background-color: lightgray;
        }

        iframe{
            display: block;
            margin: auto;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>teste de iframe</h1>
    <iframe src="https://www.cursoemvideo.com" frameborder="0" height="500" width="350">

    </iframe>
   <hr>
    <iframe src="../aulas de tabelas/tabela001.html" frameborder="0" height="400" width="400" scrolling="auto"> <!--scrolling auto, yes ou no-->
        <p>seu navegador nao é compativel</p>
    </iframe>
</body>
</html>

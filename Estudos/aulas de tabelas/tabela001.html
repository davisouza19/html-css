<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #fff;
        }

        table{
            height: 400px;
            width: 400px;
            border-collapse: collapse;
        }

        td{
            border: 1px solid black;
            padding: 8px;
            vertical-align: middle;
        }

        .linha1{
            background-color: lightgray;
        }

        .destaque{
            background-color: yellow;
        }

        .c3{
            background-color: cyan;
        }
    </style>
</head>
<body>
    <h1>Primeira tabela:</h1>
    <table>
        <colgroup>
            <col class="c1">
            <col class="c2">
            <col class="c3">
        </colgroup>
        <tr class="linha1"> <!--linha nova-->
            <td>A1</td> <!--conteúdo-->
            <td>B1</td>
            <td>C1</td>
        </tr>
        <tr>
            <td>A2</td>
            <td>B2</td>
            <td>C2</td>
        </tr>
        <tr>
            <td>A3</td>
            <td class="destaque">B3</td>
            <td>B3</td>
        </tr>   
        <tr>
            <td>A4</td>
            <td>B4</td>
            <td>B4</td>
        </tr>
    </table>
</body>
</html>

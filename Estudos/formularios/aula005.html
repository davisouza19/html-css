<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
</head>
<body>
    <!--checkbox e radio-->
    <form action="exemplo.php" method="get" autocomplete="on">
        <fieldset>
            <legend>Sexo</legend>
            <p>
                <input type="radio" name="Sexo" id="sexom" checked>
                <label for="sexom">Masculino</label>

                <input type="radio" name="Sexo" id="sexof">
                <label for="sexof">Feminino</label>
            </p>
        </fieldset>
        <fieldset>
            <legend>Esportes praticados</legend>
            <p>
                <input type="checkbox" name="esportefut" id="esportefut" checked>
                <label for="esportefut">Futebol</label><br>
                <input type="checkbox" name="esportecicli" id="esportecicli">
                <label for="esportecicli">Ciclismo</label><br>
                <input type="checkbox" name="esportenat" id="esportenat">
                <label for="esportenat">Natação</label>
            </p>
        </fieldset>
    </form>
</body>
</html>

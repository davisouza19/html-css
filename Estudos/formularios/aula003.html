<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
</head>
<body>
    <h1>Formulario escolar</h1>
    <form action="exemplo.php" method="get" autocomplete="on">
        <p>
            <label for="nome">Nome</label>
            <input type="text" name="Nome" id="nome" required minlength="3" maxlength="30" placeholder="Nome Completo" autocomplete="name">
        </p>
        <p>
            <label for="media">Média: </label>
            <input type="number" name="media" id="media" min="0" max="10" step="0.1">
        </p>
        <p>
            <label for="periodo">Periodo letivo: </label>
            <input type="month" name="periodo" id="periodo">
        </p>
        <p>
            <label for="data">Dia da prova: </label>
            <input type="date" name="data" id="data" value=2026-07-01">
        </p>
        <p>
            <label for="hora">Horaio da prova</label>
            <input type="time" name="hore" id="hora">
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex-shrink e flex-grow</title>
    <style>
        .conteiner{
            background-color: rgb(237, 221, 100);
            display: flex;
        }

        .item{
            background-color: #d68905;
            border: 1px solid black;
            text-align: center;
            flex-basis: 250px;
            /*
            0 = não pode;
            1 = pode.
            +1 = cresce proporcionalmente
            */
        }

        #i1{
            flex-shrink: 0;
            flex-grow: 0;
        }

        #i2{
            flex-shrink: 0;
            flex-grow: 1;
        }

        #i3{
            flex-shrink: 1;
            flex-grow: 0;
        }

        </style>
</head>
<body>
    <div class="conteiner">
        <div class="item" id="i1">A</div>
        <div class="item" id="i2">B</div>
        <div class="item" id="i3">C</div>
    </div>
</body>
</html>

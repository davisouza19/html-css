<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Using Order</title>
    <style>
        .conteiner{
            background-color: rgba(187, 237, 100, 0.737);
            display: flex;
        }

        .item{
            background-color: #97d605;
            border: 1px solid black;
            text-align: center;
            padding: 40px;
        }

        #a{
           order: 2; 
        }
        #b{
            order: 7;
        }
        #c{
            order: -4;
        }
        #d{
            order: 20;
        }
    </style>
</head>
<body>
    <div class="conteiner">
        <div class="item" id="a">A</div>
        <div class="item" id="b">B</div>
        <div class="item" id="c">C</div>
        <div class="item" id="d">D</div>
        <div class="item" id="e">E</div>
        <div class="item" style="order: 1;">F</div>
    </div>
</body>
</html>

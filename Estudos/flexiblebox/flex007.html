<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>usando flex-basis</title>
    <style>
        .conteiner{
            background-color: cornflowerblue;
            display: flex;
            flex-flow: row nowrap;
        }

        .item{
            background-color: #d69b05;
            border: 1px solid black;
            text-align: center;
            flex-basis: 350px;
        }
    </style>
</head>
<body>
    <div class="conteiner">
        <div class="item">A</div>
        <div class="item">BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB</div>
        <div class="item" style="flex-basis: auto;">C</div>
    </div>
</body>
</html>
